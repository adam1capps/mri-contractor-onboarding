<style>
  :root{
    --navy:#1E2C55;--navy-hover:#2a3d6e;--green:#00BD70;--green-hover:#00A862;
    --yellow:#F2C94C;--red:#EB5757;--bg:#F7F8FA;--gray-100:#F3F4F6;--gray-500:#6B7280;--gray-600:#4B5563;
    --font:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,sans-serif;
    --shadow-lg:0 10px 25px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--gray-600);min-height:100dvh;display:flex;flex-direction:column}
  header{background:var(--navy)}
  .bar{max-width:880px;margin:0 auto;padding:15px 22px;display:flex;align-items:center;gap:10px}
  .squares{display:flex;gap:3px}
  .squares i{width:10px;height:10px;display:block;border-radius:2px}
  .squares i:nth-child(1){background:#00BF63}
  .squares i:nth-child(2){background:#FFDE59}
  .squares i:nth-child(3){background:#F81414}
  .bar b{color:#fff;font-size:16px;font-weight:800;letter-spacing:.08em}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 22px}
  .card{background:#fff;border:1px solid var(--gray-100);border-radius:16px;box-shadow:var(--shadow-lg);padding:48px 40px;max-width:480px;text-align:center}
  .code{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--green);background:#00bd701f;border-radius:100px;padding:5px 14px;margin-bottom:18px}
  h1{font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--navy);margin-bottom:10px;text-wrap:balance}
  p{font-size:14.5px;margin-bottom:24px;text-wrap:pretty}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:-.1px;background:var(--green);color:#fff;border:none;border-radius:10px;padding:11px 24px;text-decoration:none;transition:all .2s}
  .btn:hover{background:var(--green-hover);transform:translateY(-1px);box-shadow:0 4px 6px -1px rgba(0,0,0,.08)}
  .btn:active{transform:translateY(1px) scale(.985)}
  .btn:focus-visible{outline:2px solid var(--navy);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>

    <a class="btn" href="https://roof-mri.com">Go to roof-mri.com</a>
  </div>
</main>
